name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decrypt Tuya security-algorithm AAR
        # The account-specific .aar itself is gitignored (see app/libs/README.md). An AES-256
        # encrypted copy (security-algorithm-1.0.0-beta.aar.enc) IS committed; it's useless
        # without the passphrase, which is stored in the THING_SECURITY_AAR_PASSPHRASE secret.
        env:
          THING_SECURITY_AAR_PASSPHRASE: ${{ secrets.THING_SECURITY_AAR_PASSPHRASE }}
        run: |
          if [ -z "$THING_SECURITY_AAR_PASSPHRASE" ]; then
            echo "::error::THING_SECURITY_AAR_PASSPHRASE secret is not set." && exit 1
          fi
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in app/libs/security-algorithm-1.0.0-beta.aar.enc \
            -out app/libs/security-algorithm-1.0.0-beta.aar \
            -pass pass:"$THING_SECURITY_AAR_PASSPHRASE"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          THING_APP_KEY: ${{ secrets.THING_APP_KEY }}
          THING_APP_SECRET: ${{ secrets.THING_APP_SECRET }}
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
