name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Needed for the release step to create tags/releases with the built-in GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decrypt Tuya security-algorithm AAR
        # The account-specific .aar itself is gitignored (see app/libs/README.md). An AES-256
        # encrypted copy (security-algorithm-1.0.0-beta.aar.enc) IS committed; it's useless
        # without the passphrase, which is stored in the THING_SECURITY_AAR_PASSPHRASE secret.
        env:
          THING_SECURITY_AAR_PASSPHRASE: ${{ secrets.THING_SECURITY_AAR_PASSPHRASE }}
        run: |
          if [ -z "$THING_SECURITY_AAR_PASSPHRASE" ]; then
            echo "::error::THING_SECURITY_AAR_PASSPHRASE secret is not set." && exit 1
          fi
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in app/libs/security-algorithm-1.0.0-beta.aar.enc \
            -out app/libs/security-algorithm-1.0.0-beta.aar \
            -pass pass:"$THING_SECURITY_AAR_PASSPHRASE"

      - name: Restore debug keystore
        # CI machines otherwise generate a fresh debug keystore each run, so every APK gets a
        # different signature (can't upgrade in place, and the signing SHA-256 won't match the
        # one registered on Tuya). Restore the shared debug keystore so all builds sign
        # identically. Falls back to Gradle's ephemeral key if the secret isn't set.
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            mkdir -p ~/.android
            echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > ~/.android/debug.keystore
            echo "Restored shared debug keystore."
          else
            echo "::warning::DEBUG_KEYSTORE_BASE64 not set; using an ephemeral debug key (signature differs per build)."
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          THING_APP_KEY: ${{ secrets.THING_APP_KEY }}
          THING_APP_SECRET: ${{ secrets.THING_APP_SECRET }}
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        # Only on real builds (push to main / manual run), never on pull requests.
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Name: SmartHome-<DDMMYYYY><Nth build that day>.apk, e.g. SmartHome-030720261.apk.
          # Date is in Asia/Jakarta so it matches the local calendar day.
          DATE=$(TZ=Asia/Jakarta date +%d%m%Y)
          COUNT=$(gh release list --limit 200 | grep -c "SmartHome-${DATE}" || true)
          N=$((COUNT + 1))
          NAME="SmartHome-${DATE}${N}"
          APK="app/build/outputs/apk/debug/${NAME}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK"
          gh release create "$NAME" "$APK" \
            --title "$NAME" \
            --notes "Automated debug build: $NAME (commit ${GITHUB_SHA::7})"
